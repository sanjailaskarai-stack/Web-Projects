<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>Rock Paper Scissors</h1>

<div class="scoreboard">
<div>Player: <span id="playerScore">0</span></div>
<div>Computer: <span id="computerScore">0</span></div>
</div>

<div class="choices">
<button class="choice" onclick="playGame('rock')">✊</button>
<button class="choice" onclick="playGame('paper')">✋</button>
<button class="choice" onclick="playGame('scissors')">✌</button>
</div>

<div class="results">
<p id="playerMove"></p>
<p id="computerMove"></p>
<h2 id="resultText">Make your move!</h2>
</div>

<button class="reset" onclick="resetGame()">Reset Game</button>

</div>

<script src="index.js"></script>

</body>
</html>
